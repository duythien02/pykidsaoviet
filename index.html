<!DOCTYPE html>
<html lang="vi" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyKids 🐍 - Học Python Kéo Thả Thú Vị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/@blockly/field-colour"></script>
    <script src="https://unpkg.com/blockly/msg/vi.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .playful-font {
            font-family: 'Fredoka', sans-serif;
        }

        /* Modern Scrollbars for Flyout */
        .blocklyScrollbarHandle {
            fill: #cbd5e1 !important;
            fill-opacity: 0.6 !important;
            rx: 6px !important;
            ry: 6px !important;
        }

        .blocklyScrollbarBackground {
            fill: transparent !important;
            opacity: 0 !important;
        }

        /* Custom Scratch-like Sidebar */
        .scratch-sidebar {
            width: 75px;
            background-color: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 50;
        }

        .scratch-category {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 10px 4px;
            width: 100%;
            transition: background 0.1s;
            user-select: none;
        }

        .scratch-category:hover {
            background: #f1f5f9;
        }

        .scratch-cat-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-bottom: 4px;
        }

        .scratch-cat-text {
            font-size: 10px;
            text-align: center;
            font-weight: 600;
            color: #64748b;
        }

        /* Flyout Titles Label */
        .blocklyFlyoutLabelText {
            font-family: 'Fredoka', sans-serif !important;
            font-size: 14pt !important;
            font-weight: 700 !important;
            fill: #475569 !important;
        }

        .terminal-bg {
            background-color: #0f172a;
        }

        .bouncy-btn {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
        }

        .bouncy-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .bouncy-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-white text-slate-800 h-full flex flex-col overflow-hidden">

    <!-- Header bar -->
    <header class="bg-[#8b5cf6] px-6 py-2 flex items-center justify-between shrink-0 shadow-md relative z-10">
        <div class="flex items-center space-x-3">
            <div class="bg-white text-[#8b5cf6] p-2 rounded-xl shadow-sm transform -rotate-3">
                <i class="fa-solid fa-snake text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black playful-font text-white tracking-wide">PyKids</h1>
            </div>
        </div>


    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">

        <!-- Left Side: Custom Scratch Toolbox & Blockly Editor -->
        <section class="flex-1 flex h-full relative">

            <!-- Custom Scratch-like Continuous Scroll Sidebar -->
            <div id="scratch-sidebar" class="scratch-sidebar">

                <div class="scratch-category" onclick="scrollToCategory('text')" data-color="#06b6d4">
                    <div class="scratch-cat-circle" style="background: #06b6d4;"></div>
                    <div class="scratch-cat-text">In ấn</div>
                </div>
                <div class="scratch-category" onclick="scrollToCategory('variables_set')" data-color="#14b8a6">
                    <div class="scratch-cat-circle" style="background: #14b8a6;"></div>
                    <div class="scratch-cat-text">Biến số</div>
                </div>
                <div class="scratch-category" onclick="scrollToCategory('math_number')" data-color="#3b82f6">
                    <div class="scratch-cat-circle" style="background: #3b82f6;"></div>
                    <div class="scratch-cat-text">Toán số</div>
                </div>
                <div class="scratch-category" onclick="scrollToCategory('controls_if')" data-color="#f59e0b">
                    <div class="scratch-cat-circle" style="background: #f59e0b;"></div>
                    <div class="scratch-cat-text">Điều kiện</div>
                </div>
                <div class="scratch-category" onclick="scrollToCategory('controls_whileUntil')" data-color="#8b5cf6">
                    <div class="scratch-cat-circle" style="background: #8b5cf6;"></div>
                    <div class="scratch-cat-text">Vòng lặp</div>
                </div>
                <div class="scratch-category" onclick="scrollToCategory('turtle_pen')" data-color="#ec4899">
                    <div class="scratch-cat-circle" style="background: #ec4899;"></div>
                    <div class="scratch-cat-text">Bút vẽ</div>
                </div>
                <div class="scratch-category" onclick="scrollToCategory('turtle_forward')" data-color="#10b981">
                    <div class="scratch-cat-circle" style="background: #10b981;"></div>
                    <div class="scratch-cat-text">Di chuyển</div>
                </div>
            </div>

            <!-- Main Blockly Container Div -->
            <div id="blockly-editor" class="flex-1 h-full relative border-r border-slate-200"></div>
        </section>

        <!-- Right Side: Scratch-like UI (Stage, Info, Sprites) -->
        <section
            class="w-full md:w-1/2 lg:w-[600px] flex flex-col shrink-0 bg-[#eef2f6] h-[45vh] md:h-full overflow-hidden font-sans md:border-l border-t md:border-t-0 border-slate-300">

            <!-- 1. Stage Header (Green Flag & Stop) -->
            <div class="bg-white flex items-center justify-between px-4 py-2 shrink-0 border-b border-slate-200">
                <div class="flex space-x-5">
                    <button id="run-btn" onclick="runCode()"
                        class="text-[#4ade80] hover:text-[#22c55e] transition-transform hover:scale-110 active:scale-95"
                        title="Chạy chương trình (Lá cờ xanh)">
                        <i class="fa-solid fa-flag text-2xl drop-shadow-sm"></i>
                    </button>
                    <button id="stop-btn" onclick="stopExecution()"
                        class="text-[#ef4444] hover:text-[#dc2626] transition-transform hover:scale-110 active:scale-95"
                        title="Dừng">
                        <i class="fa-solid fa-circle-stop text-2xl drop-shadow-sm"></i>
                    </button>
                    <button id="reset-btn" onclick="hardResetStage()"
                        class="text-[#fbbf24] hover:text-[#f59e0b] transition-transform hover:scale-110 active:scale-95"
                        title="Khôi phục gốc (Về trung tâm & Xóa vẽ)">
                        <i class="fa-solid fa-rotate-left text-2xl drop-shadow-sm"></i>
                    </button>
                </div>
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">Tốc độ</span>
                    <input id="speed-slider" type="range" min="1" max="10" value="5"
                        class="w-16 accent-[#8b5cf6] cursor-pointer">
                </div>
            </div>

            <!-- 2. Stage (Canvas) -->
            <div class="bg-white relative flex items-center justify-center shrink-0 w-full overflow-hidden border-b border-slate-200">
                <canvas id="turtle-canvas" width="600" height="340" class="w-full h-auto block"></canvas>
            </div>


            <!-- 5. Python/Console Tabs -->
            <div class="bg-white border-t border-slate-300 flex flex-col flex-1 z-20">
                <div class="bg-[#f8fafc] px-2 pt-1 flex items-center justify-between border-b border-slate-200">
                    <div class="flex space-x-1">
                        <button id="tab-code-btn" onclick="switchTab('code')"
                            class="px-3 py-1.5 rounded-t-lg font-bold text-xs transition-all border-b-2 border-indigo-500 text-indigo-600 bg-white shadow-sm">
                            <i class="fa-brands fa-python text-amber-500 mr-1"></i>Python
                        </button>
                        <button id="tab-console-btn" onclick="switchTab('console')"
                            class="px-3 py-1.5 rounded-t-lg font-bold text-xs transition-all text-slate-500 hover:text-slate-800 bg-transparent">
                            <i class="fa-solid fa-terminal text-emerald-500 mr-1"></i>Console
                        </button>
                        <button id="tab-explain-btn" onclick="switchTab('explain')"
                            class="px-3 py-1.5 rounded-t-lg font-bold text-xs transition-all text-slate-500 hover:text-slate-800 bg-transparent">
                            <i class="fa-solid fa-lightbulb text-amber-500 mr-1"></i>Giải thích
                        </button>
                    </div>
                </div>

                <div class="flex-1 relative">
                    <div id="tab-code" class="absolute inset-0 p-3 overflow-auto terminal-bg flex flex-col">
                        <pre
                            class="font-mono text-[14px] leading-relaxed overflow-x-auto text-slate-100 flex-1"><code id="python-preview"># Kéo khối để xem mã nguồn Python...</code></pre>
                    </div>
                    <div id="tab-console" class="absolute inset-0 p-3 overflow-auto bg-slate-900 flex flex-col hidden">
                        <div id="console-output"
                            class="font-mono text-[14px] leading-relaxed text-emerald-300 flex-1 whitespace-pre-wrap">
                            Sẵn sàng nhận lệnh!</div>
                    </div>
                    <div id="tab-explain"
                        class="absolute inset-0 p-4 overflow-auto bg-amber-50/90 flex flex-col hidden">
                        <div id="explain-output"
                            class="font-sans text-[15px] leading-relaxed text-slate-800 flex-1 whitespace-pre-wrap">Ghép
                            khối để xem giải thích nhé!</div>
                    </div>
                </div>
            </div>

        </section>
    </main>
    <script>

            }

        Blockly.Blocks['turtle_right'] = {

        Blockly.Blocks['py_print'] = {

    <script>
        function getJsInputValue(block, generator, name, defaultValue) {
            const activeGen = generator || (typeof javascript !== 'undefined' ? javascript.javascriptGenerator : Blockly.JavaScript);
            let orderVal = activeGen && activeGen.ORDER_ATOMIC !== undefined ? activeGen.ORDER_ATOMIC : 99;
            return activeGen.valueToCode(block, name, orderVal) || defaultValue;
        }
        function getPyInputValue(block, generator, name, defaultValue) {
            const activeGen = generator || (typeof python !== 'undefined' ? python.pythonGenerator : Blockly.Python);
            let orderVal = activeGen && activeGen.ORDER_ATOMIC !== undefined ? activeGen.ORDER_ATOMIC : 99;
            return activeGen.valueToCode(block, name, orderVal) || defaultValue;
        }

        function getExplainInputValue(block, name, defaultValue) {
            return explainGen.valueToCode(block, name, explainGen.ORDER_NONE) || defaultValue;
        }

        const explainGen = new Blockly.Generator('Explain');
        explainGen.ORDER_ATOMIC = 0;
        explainGen.ORDER_NONE = 99;
        explainGen.init = function (workspace) { };
        explainGen.finish = function (code) { return code; };
        explainGen.scrub_ = function (block, code, opt_thisOnly) {
            const nextBlock = block.nextConnection && block.nextConnection.targetBlock();
            const nextCode = opt_thisOnly ? '' : explainGen.blockToCode(nextBlock);
            return code + nextCode;
        };

        function registerAllGenerators() {
            const jsGen = typeof javascript !== 'undefined' ? javascript.javascriptGenerator : Blockly.JavaScript;
            const pyGen = typeof python !== 'undefined' ? python.pythonGenerator : Blockly.Python;

            if (!jsGen.forBlock) jsGen.forBlock = {};
            if (!pyGen.forBlock) pyGen.forBlock = {};
            if (!explainGen.forBlock) explainGen.forBlock = {};

            const mapBlock = (name, jsFunc, pyFunc, explainFunc) => {
                jsGen.forBlock[name] = jsFunc; jsGen[name] = jsFunc;
                pyGen.forBlock[name] = pyFunc; pyGen[name] = pyFunc;
                if (explainFunc) {
                    explainGen.forBlock[name] = explainFunc; explainGen[name] = explainFunc;
                }
            };

            mapBlock('turtle_forward',
                (b, g) => `queueCommand({type: "forward", value: ${getJsInputValue(b, g, 'STEPS', '10')}});\n`,
                (b, g) => `turtle.forward(${getPyInputValue(b, g, 'STEPS', '10')})\n`,
                (b) => `🐢 Rùa tiến về phía trước ${getExplainInputValue(b, 'STEPS', '10')} bước\n`
            );
            mapBlock('turtle_backward',
                (b, g) => `queueCommand({type: "backward", value: ${getJsInputValue(b, g, 'STEPS', '10')}});\n`,
                (b, g) => `turtle.backward(${getPyInputValue(b, g, 'STEPS', '10')})\n`,
                (b) => `🐢 Rùa lùi về phía sau ${getExplainInputValue(b, 'STEPS', '10')} bước\n`
            );
            mapBlock('turtle_right',
                (b, g) => `queueCommand({type: "right", value: ${getJsInputValue(b, g, 'DEGREES', '90')}});\n`,
                (b, g) => `turtle.right(${getPyInputValue(b, g, 'DEGREES', '90')})\n`,
                (b) => `🐢 Rùa xoay phải ${getExplainInputValue(b, 'DEGREES', '90')} độ\n`
            );
            mapBlock('turtle_left',
                (b, g) => `queueCommand({type: "left", value: ${getJsInputValue(b, g, 'DEGREES', '90')}});\n`,
                (b, g) => `turtle.left(${getPyInputValue(b, g, 'DEGREES', '90')})\n`,
                (b) => `🐢 Rùa xoay trái ${getExplainInputValue(b, 'DEGREES', '90')} độ\n`
            );
            mapBlock('turtle_pen',
                (b, g) => `queueCommand({type: "pen", value: ${b.getFieldValue('PEN_STATE') === 'pendown' ? 'true' : 'false'}});\n`,
                (b, g) => b.getFieldValue('PEN_STATE') === 'pendown' ? 'turtle.pendown()\n' : 'turtle.penup()\n',
                (b) => `🐢 Rùa ${b.getFieldValue('PEN_STATE') === 'pendown' ? 'đặt bút xuống để vẽ' : 'nhấc bút lên không vẽ nữa'}\n`
            );
            mapBlock('turtle_color',
                (b, g) => `queueCommand({type: "color", color: "${b.getFieldValue('COLOR')}", fillColor: "${b.getFieldValue('FILL_COLOR')}"});\n`,
                (b, g) => `turtle.color("${b.getFieldValue('COLOR')}", "${b.getFieldValue('FILL_COLOR')}")\n`,
                (b) => `🎨 Đổi màu: Màu nét ${b.getFieldValue('COLOR')} và Màu tô ${b.getFieldValue('FILL_COLOR')}\n`
            );
            mapBlock('turtle_width',
                (b, g) => `queueCommand({type: "width", value: ${getJsInputValue(b, g, 'WIDTH', '3')}});\n`,
                (b, g) => `turtle.width(${getPyInputValue(b, g, 'WIDTH', '3')})\n`,
                (b) => `🖍️ Đổi độ dày nét vẽ thành ${getExplainInputValue(b, 'WIDTH', '3')}\n`
            );
            mapBlock('py_print',
                (b, g) => `queueCommand({type: "print", value: ${getJsInputValue(b, g, 'TEXT', '""')}});\n`,
                (b, g) => `print(${getPyInputValue(b, g, 'TEXT', '""')})\n`,
                (b) => `👉 In ra màn hình nội dung: ${getExplainInputValue(b, 'TEXT', '""')}\n`
            );
            mapBlock('py_input',
                (b, g) => [`(await customPrompt(${getJsInputValue(b, g, 'TEXT', '""')}))`, (g && g.ORDER_FUNCTION_CALL !== undefined ? g.ORDER_FUNCTION_CALL : 99)],

    <script>
        const canvas = document.getElementById('turtle-canvas');
        const ctx = canvas.getContext('2d');
        let paths = [];
        let turtleStart = { x: 300, y: 170, angle: 0 };
        let turtleState = { x: 300, y: 170, angle: 0, penDown: true, color: '#3b82f6', width: 3 };

        function drawBackground() {
            if (turtleState.customBgColor) {
                ctx.fillStyle = turtleState.customBgColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                // Default clean background
                ctx.fillStyle = '#fffdf5'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function drawCompanion(context, x, y, angleDeg) {
            context.save(); context.translate(x, y); context.rotate(angleDeg * Math.PI / 180);
            const iconKey = turtleState.shape || activeCompanion;

            if (iconKey === 'arrow') {
                context.fillStyle = turtleState.color || '#3b82f6';
                context.strokeStyle = '#ffffff';
                context.lineWidth = 1.5;
                context.beginPath();
                context.moveTo(12, 0);
                context.lineTo(-8, -8);
                context.lineTo(-4, 0);
                context.lineTo(-8, 8);
                context.closePath();
                context.fill();
                context.stroke();
            } else if (iconKey === 'circle') {
                context.fillStyle = turtleState.color || '#3b82f6';
                context.strokeStyle = '#ffffff';
                context.lineWidth = 1.5;
                context.beginPath();
                context.arc(0, 0, 8, 0, 2 * Math.PI);
                context.fill();
                context.stroke();
            } else {
                const icons = { turtle: '🐢', cat: '🐱', rabbit: '🐰', bee: '🐝', rocket: '🚀' };
                const icon = icons[iconKey] || '🐢';
                context.font = '24px Arial';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                
                // Hầu hết các emoji đều quay mặt sang trái, để mặc định hướng sang phải thì cần lật ngược lại
                if (iconKey === 'turtle' || iconKey === 'cat' || iconKey === 'rabbit' || iconKey === 'bee') {
                    context.scale(-1, 1);
                } else if (iconKey === 'rocket') {
                    // Rocket mặc định chéo lên (45 độ), xoay thêm 45 độ để thành nằm ngang sang phải
                    context.rotate(Math.PI / 4); 
                }
                
                context.fillText(icon, 0, 0);
            }
            context.restore();
        }

        function drawSpeechBubble(context, x, y, text) {
            context.save();
            context.font = 'bold 14px "Nunito", sans-serif';
            const paddingX = 12;
            const paddingY = 8;
            const metrics = context.measureText(text);
            const w = metrics.width + paddingX * 2;
            const h = 18 + paddingY * 2;

            const bx = x + 15;
            const by = y - 55;

            context.fillStyle = 'white';
            context.strokeStyle = '#94a3b8';
            context.lineWidth = 2;
            context.beginPath();
            if (context.roundRect) {
                context.roundRect(bx, by, w, h, 10);
            } else {
                context.rect(bx, by, w, h);
            }
            context.fill();
            context.stroke();

            context.beginPath();
            context.moveTo(bx + 10, by + h);
            context.lineTo(bx - 5, by + h + 15);
            context.lineTo(bx + 25, by + h);
            context.fill();
            context.stroke();

            context.beginPath();
            context.moveTo(bx + 11, by + h);
            context.lineTo(bx + 24, by + h);
            context.strokeStyle = 'white';
            context.lineWidth = 3;
            context.stroke();

            context.fillStyle = '#334155';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, bx + w / 2, by + h / 2);
            context.restore();
        }

        function drawCanvas() {
            drawBackground();
            paths.forEach(p => {
                if (p.type === 'fill' && p.points && p.points.length > 0) {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.moveTo(p.points[0].x, p.points[0].y);
                    for (let i = 1; i < p.points.length; i++) ctx.lineTo(p.points[i].x, p.points[i].y);
                    ctx.fill();
                } else if (p.type === 'circle') {
                    ctx.strokeStyle = p.color; ctx.lineWidth = p.width; ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(p.cx, p.cy, p.r, p.startAngleRad, p.endAngleRad, p.counterClockwise);
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = p.color; ctx.lineWidth = p.width; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2); ctx.stroke();
                }
            });
            if (currentCommand && (currentCommand.type === 'forward' || currentCommand.type === 'backward')) {
                if (turtleState.penDown) {
                    ctx.strokeStyle = turtleState.color; ctx.lineWidth = turtleState.width; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(currentCommand.startX, currentCommand.startY); ctx.lineTo(turtleState.x, turtleState.y); ctx.stroke();
                }
            } else if (currentCommand && currentCommand.type === 'circle') {
                if (turtleState.penDown) {
                    ctx.strokeStyle = turtleState.color; ctx.lineWidth = turtleState.width; ctx.lineCap = 'round';
                    ctx.beginPath();
                    const startAngleRad = currentCommand.phi0 * Math.PI / 180;
                    let endAngleRad;
                    if (currentCommand.isCounterClockwise) {
                        endAngleRad = (currentCommand.phi0 - animationProgress * 360) * Math.PI / 180;
                    } else {
                        endAngleRad = (currentCommand.phi0 + animationProgress * 360) * Math.PI / 180;
                    }
                    ctx.arc(currentCommand.cx, currentCommand.cy, currentCommand.R, startAngleRad, endAngleRad, currentCommand.isCounterClockwise);
                    ctx.stroke();
                }
            }
            drawCompanion(ctx, turtleState.x, turtleState.y, turtleState.angle);

            if (turtleState.speechBubble) {
                if (Date.now() - turtleState.speechBubble.time < 3000) {
                    drawSpeechBubble(ctx, turtleState.x, turtleState.y, turtleState.speechBubble.text);
                } else {
                    turtleState.speechBubble = null;
                }
            }

            if (turtleState.loopText) {
                ctx.save();
                ctx.font = 'bold 16px "Nunito", sans-serif';
                const metrics = ctx.measureText(turtleState.loopText);
                const padding = 10;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 2;
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(15, 15, metrics.width + padding * 2, 24 + padding * 2, 8);
                } else {
                    ctx.rect(15, 15, metrics.width + padding * 2, 24 + padding * 2);
                }
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#10b981'; // Green color
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(turtleState.loopText, 15 + padding, 15 + 12 + padding);
                ctx.restore();
            }
        }

        function updateCoordsDisplay() {
            // Đã ẩn các thành phần giao diện không liên quan đến Python
        }

        // Xử lý kéo thả nhân vật trên sân khấu
        let isDraggingTurtle = false;
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const dist = Math.hypot(mouseX - turtleState.x, mouseY - turtleState.y);
            if (dist < 30) { isDraggingTurtle = true; canvas.style.cursor = 'grabbing'; }
        });
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            if (isDraggingTurtle) {
                turtleState.x = mouseX; turtleState.y = mouseY; drawCanvas();
            } else {
                const dist = Math.hypot(mouseX - turtleState.x, mouseY - turtleState.y);
                canvas.style.cursor = dist < 30 ? 'grab' : 'default';
            }
        });
        window.addEventListener('mouseup', () => {
            if (isDraggingTurtle) {
                isDraggingTurtle = false;
                canvas.style.cursor = 'default';
                turtleStart.x = turtleState.x;
                turtleStart.y = turtleState.y;
            }
        });
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            const mouseX = (touch.clientX - rect.left) * scaleX;
            const mouseY = (touch.clientY - rect.top) * scaleY;
            const dist = Math.hypot(mouseX - turtleState.x, mouseY - turtleState.y);
            if (dist < 40) { isDraggingTurtle = true; e.preventDefault(); }
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            if (isDraggingTurtle) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches[0];
                turtleState.x = (touch.clientX - rect.left) * scaleX;
                turtleState.y = (touch.clientY - rect.top) * scaleY;
                drawCanvas();
                e.preventDefault();
            }
        }, { passive: false });
        window.addEventListener('touchend', () => {
            if (isDraggingTurtle) {
                isDraggingTurtle = false;
                turtleStart.x = turtleState.x;
                turtleStart.y = turtleState.y;
            }
        });

        function hardResetStage() {
            playClick();
            turtleStart = { x: 300, y: 170, angle: 0 };
            resetTurtle();
        }

        function resetTurtle() {
            paths = [];
            turtleState = { x: turtleStart.x, y: turtleStart.y, angle: turtleStart.angle, penDown: true, color: '#3b82f6', fillColor: '#f43f5e', width: 3, customBgColor: null, shape: null, isFilling: false, fillPoints: [] };
            updateCoordsDisplay(); drawCanvas();
        }

        // Removed changeCompanion function to clean up
    </script>

    <script>
        let commandQueue = []; let currentCommand = null; let animationProgress = 0; let executionTimer = null;

        function queueCommand(cmd) {
            commandQueue.push(cmd);
            if (!executionTimer && !currentCommand) {
                startAnimationLoop();
            }
        }
        function addConsoleMessage(msg) {
            const box = document.getElementById('console-output');
            if (box.textContent.startsWith("Sẵn sàng")) box.textContent = "";
            box.textContent += msg + "\n"; box.scrollTop = box.scrollHeight;
        }

        function handleError(msg) {
            stopExecution();
            addConsoleMessage(msg);
            showErrorAlert(msg);
        }

        function runCode() {
            stopExecution(); resetTurtle(); document.getElementById('console-output').textContent = "";
            playClick(); switchTab('console');
            window.loopStartTime = Date.now();
            try {
                const jsGen = typeof javascript !== 'undefined' ? javascript.javascriptGenerator : Blockly.JavaScript;
                jsGen.INFINITE_LOOP_TRAP = 'if (Date.now() - window.loopStartTime > 3000) throw new Error("Phát hiện lặp vô tận! Vui lòng kiểm tra lại điều kiện vòng lặp.");\n';
                const startBlock = workspace.getTopBlocks(false).find(b => b.type === 'event_start');
                if (startBlock) {
                    jsGen.init(workspace);
                    let code = jsGen.blockToCode(startBlock);
                    code = jsGen.finish(code);
                    let asyncCode = `(async function() {\n${code}\n})().catch(err => handleError("Lỗi: " + err.message));`;
                    eval(asyncCode);
                    startAnimationLoop();
                } else {
                    addConsoleMessage("Không tìm thấy khối '▶ Khi bấm nút chạy'!");
                }
            } catch (err) { handleError("Lỗi: " + err.message); }
        }

        function stopExecution() {
            if (executionTimer) cancelAnimationFrame(executionTimer); executionTimer = null;
            commandQueue = []; currentCommand = null; animationProgress = 0; drawCanvas();
        }

        function startAnimationLoop() {
            function step() {
                const sliderVal = parseInt(document.getElementById('speed-slider').value);
                // Biến đổi hàm mũ để mức 1 cực kỳ chậm (quan sát vòng lặp), mức 10 cực kỳ nhanh
                const speedMulti = Math.pow(sliderVal / 5, 2) * 5;
                if (!currentCommand) {
                    if (commandQueue.length > 0) {
                        currentCommand = commandQueue.shift(); animationProgress = 0;
                        if (currentCommand.type === 'forward' || currentCommand.type === 'backward') {
                            currentCommand.startX = turtleState.x; currentCommand.startY = turtleState.y;
                            let dist = currentCommand.type === 'backward' ? -currentCommand.value : currentCommand.value;
                            const rad = turtleState.angle * Math.PI / 180;
                            currentCommand.endX = turtleState.x + dist * Math.cos(rad); currentCommand.endY = turtleState.y + dist * Math.sin(rad);
                        } else if (currentCommand.type === 'right' || currentCommand.type === 'left') {
                            currentCommand.startAngle = turtleState.angle;
                            currentCommand.endAngle = turtleState.angle + (currentCommand.type === 'left' ? -currentCommand.value : currentCommand.value);
                        } else if (currentCommand.type === 'circle') {
                            currentCommand.startX = turtleState.x;
                            currentCommand.startY = turtleState.y;
                            currentCommand.startAngle = turtleState.angle;

                            const r = currentCommand.value;
                            const R = Math.abs(r);
                            currentCommand.R = R;
                            currentCommand.isCounterClockwise = (r > 0);

                            if (r > 0) {
                                const radCenter = (turtleState.angle - 90) * Math.PI / 180;
                                currentCommand.cx = turtleState.x + R * Math.cos(radCenter);
                                currentCommand.cy = turtleState.y + R * Math.sin(radCenter);
                                currentCommand.phi0 = turtleState.angle + 90;
                            } else {
                                const radCenter = (turtleState.angle + 90) * Math.PI / 180;
                                currentCommand.cx = turtleState.x + R * Math.cos(radCenter);
                                currentCommand.cy = turtleState.y + R * Math.sin(radCenter);
                                currentCommand.phi0 = turtleState.angle - 90;
                            }
                        }
                    } else {
                        currentCommand = null;
                        drawCanvas();
                        if (turtleState.speechBubble) {
                            executionTimer = requestAnimationFrame(step);
                        } else {
                            executionTimer = null;
                        }
                        return;
                    }
                }

                if (currentCommand) {
                    animationProgress += 0.02 * speedMulti; if (animationProgress >= 1) animationProgress = 1;

                    if (currentCommand.type === 'forward' || currentCommand.type === 'backward') {
                        turtleState.x = currentCommand.startX + (currentCommand.endX - currentCommand.startX) * animationProgress;
                        turtleState.y = currentCommand.startY + (currentCommand.endY - currentCommand.startY) * animationProgress;
                        if (turtleState.isFilling) {
                            if (animationProgress >= 1) turtleState.fillPoints.push({ x: turtleState.x, y: turtleState.y });
                        }
                        if (animationProgress >= 1) {
                            if (turtleState.penDown) paths.push({ x1: currentCommand.startX, y1: currentCommand.startY, x2: currentCommand.endX, y2: currentCommand.endY, color: turtleState.color, width: turtleState.width });
                            turtleState.x = currentCommand.endX; turtleState.y = currentCommand.endY; currentCommand = null;
                        }
                    } else if (currentCommand.type === 'right' || currentCommand.type === 'left') {
                        turtleState.angle = currentCommand.startAngle + (currentCommand.endAngle - currentCommand.startAngle) * animationProgress;
                        if (animationProgress >= 1) { turtleState.angle = currentCommand.endAngle; currentCommand = null; }
                    } else if (currentCommand.type === 'pen') {
                        turtleState.penDown = currentCommand.value; currentCommand = null;
                    } else if (currentCommand.type === 'color') {
                        turtleState.color = currentCommand.color;
                        turtleState.fillColor = currentCommand.fillColor;
                        currentCommand = null;
                    } else if (currentCommand.type === 'width') {
                        turtleState.width = Math.max(1, currentCommand.value); currentCommand = null;
                    } else if (currentCommand.type === 'circle') {
                        const R = currentCommand.R;
                        const cx = currentCommand.cx;
                        const cy = currentCommand.cy;
                        const phi0 = currentCommand.phi0;

                        let phi, heading;
                        if (currentCommand.isCounterClockwise) {
                            phi = phi0 - animationProgress * 360;
                            heading = currentCommand.startAngle - animationProgress * 360;
                        } else {
                            phi = phi0 + animationProgress * 360;
                            heading = currentCommand.startAngle + animationProgress * 360;
                        }

                        const rad = phi * Math.PI / 180;
                        turtleState.x = cx + R * Math.cos(rad);
                        turtleState.y = cy + R * Math.sin(rad);
                        turtleState.angle = heading;

                        if (turtleState.isFilling) {
                            turtleState.fillPoints.push({ x: turtleState.x, y: turtleState.y });
                        }

                        if (animationProgress >= 1) {
                            if (turtleState.penDown) {
                                paths.push({
                                    type: 'circle',
                                    cx: cx,
                                    cy: cy,
                                    r: R,
                                    startAngleRad: phi0 * Math.PI / 180,
                                    endAngleRad: phi * Math.PI / 180,
                                    counterClockwise: currentCommand.isCounterClockwise,
                                    color: turtleState.color,
                                    width: turtleState.width
                                });
                            }
                            if (turtleState.isFilling) {
                                // Add 36 points around the circle to fillPoints to ensure smooth fill
                                for (let i = 0; i <= 36; i++) {
                                    const pVal = i / 36;
                                    let pPhi;
                                    if (currentCommand.isCounterClockwise) {
                                        pPhi = phi0 - pVal * 360;
                                    } else {
                                        pPhi = phi0 + pVal * 360;
                                    }
                                    const pRad = pPhi * Math.PI / 180;
                                    turtleState.fillPoints.push({
                                        x: cx + R * Math.cos(pRad),
                                        y: cy + R * Math.sin(pRad)
                                    });
                                }
                            }
                            currentCommand = null;
                        }
                    } else if (currentCommand.type === 'bgcolor') {
                        turtleState.customBgColor = currentCommand.value; currentCommand = null;
                    } else if (currentCommand.type === 'begin_fill') {
                        turtleState.isFilling = true;
                        turtleState.fillPoints = [{ x: turtleState.x, y: turtleState.y }];
                        currentCommand = null;
                    } else if (currentCommand.type === 'end_fill') {
                        turtleState.isFilling = false;
                        if (turtleState.fillPoints && turtleState.fillPoints.length > 0) {
                            paths.push({ type: 'fill', points: [...turtleState.fillPoints], color: turtleState.fillColor });
                        }
                        currentCommand = null;
                    } else if (currentCommand.type === 'speed') {
                        let val = Math.max(1, Math.min(10, currentCommand.value));
                        let el = document.getElementById('speed-slider');
                        if (el) el.value = val;
                        currentCommand = null;
                    } else if (currentCommand.type === 'shape') {
                        turtleState.shape = currentCommand.value; currentCommand = null;
                    } else if (currentCommand.type === 'clear') {
                        paths = []; turtleState.customBgColor = null; currentCommand = null;
                    } else if (currentCommand.type === 'home') {
                        turtleState.x = 300; turtleState.y = 170; turtleState.angle = 0; currentCommand = null;
                    } else if (currentCommand.type === 'print') {
                        if (!currentCommand.started) {
                            currentCommand.started = true;
                            addConsoleMessage(currentCommand.value);
                        }
                        // Cập nhật liên tục thời gian để bong bóng không biến mất trong lúc đang "nói"
                        turtleState.speechBubble = { text: currentCommand.value, time: Date.now() };
                        if (animationProgress >= 1) currentCommand = null;
                    } else if (currentCommand.type === 'loop_text') {
                        turtleState.loopText = currentCommand.value;
                        currentCommand = null;
                    } else { currentCommand = null; }

                    updateCoordsDisplay(); drawCanvas();
                }
                executionTimer = requestAnimationFrame(step);
            }
            executionTimer = requestAnimationFrame(step);
        }

        function switchTab(tabId) {
            const btnCode = document.getElementById('tab-code-btn');
            const btnConsole = document.getElementById('tab-console-btn');
            const btnExplain = document.getElementById('tab-explain-btn');
            const paneCode = document.getElementById('tab-code');
            const paneConsole = document.getElementById('tab-console');
            const paneExplain = document.getElementById('tab-explain');

            const activeClass = "px-3 py-1.5 rounded-t-lg font-bold text-xs transition-all border-b-2 border-indigo-500 text-indigo-600 bg-white shadow-sm";
            const inactiveClass = "px-3 py-1.5 rounded-t-lg font-bold text-xs transition-all text-slate-500 hover:text-slate-800 bg-transparent";

            if (btnCode) btnCode.className = tabId === 'code' ? activeClass : inactiveClass;
            if (btnConsole) btnConsole.className = tabId === 'console' ? activeClass : inactiveClass;
            if (btnExplain) btnExplain.className = tabId === 'explain' ? activeClass : inactiveClass;

            if (paneCode) paneCode.classList.toggle('hidden', tabId !== 'code');
            if (paneConsole) paneConsole.classList.toggle('hidden', tabId !== 'console');
            if (paneExplain) paneExplain.classList.toggle('hidden', tabId !== 'explain');
        }

        function handleWorkspaceChange() {
            const pyGen = typeof python !== 'undefined' ? python.pythonGenerator : Blockly.Python;
            const startBlock = workspace.getTopBlocks(false).find(b => b.type === 'event_start');
            let pythonRaw = "";
            let explainRaw = "";
            if (startBlock) {
                pyGen.init(workspace);
                pythonRaw = pyGen.blockToCode(startBlock);
                pythonRaw = pyGen.finish(pythonRaw);
                // Loại bỏ các khai báo biến "= None" vô nghĩa của Blockly Python
                pythonRaw = pythonRaw.replace(/^[a-zA-Z0-9_]+\s*=\s*None\r?\n/gm, '');
                pythonRaw = pythonRaw.trimStart();

                explainGen.init(workspace);
                explainRaw = explainGen.blockToCode(startBlock);
                explainRaw = explainGen.finish(explainRaw);

                let lines = explainRaw.split('\n').filter(l => l.trim().length > 0);
                explainRaw = lines.map((line, index) => {
                    let indentMatch = line.match(/^\s*/);
                    let indent = indentMatch ? indentMatch[0] : '';
                    let cleanLine = line.substring(indent.length);
                    return `<span class="text-indigo-600 font-bold">Bước ${index + 1}:</span> ${cleanLine}`;
                }).join('<br/>');
            }
            let prefix = pythonRaw.includes('turtle') ? "import turtle\nt = turtle.Turtle()\n\n" : "";
            document.getElementById('python-preview').textContent = pythonRaw.trim() === "" ? "# Hãy ghép các khối lệnh vào bên dưới khối 'Khi bấm nút chạy' nhé!" : prefix + pythonRaw;
            document.getElementById('explain-output').innerHTML = explainRaw.trim() === "" ? "Ghép khối để xem giải thích nhé!" : explainRaw;
        }

        // Custom Flyout Scroll Logic
        function scrollToCategory(firstBlockType) {
            playClick();
            const flyout = workspace.getFlyout();
            if (flyout) {
                const flyoutWs = flyout.getWorkspace();
                let targetBlock = flyoutWs.getTopBlocks(false).find(b => b.type === firstBlockType);
                let targetY = targetBlock ? targetBlock.getRelativeToSurfaceXY().y : 0;
                if (firstBlockType === 'variables_set' && flyout.buttons_.length > 0) targetY = flyout.buttons_[0].info_.y;
                if (flyoutWs.scrollbar) flyoutWs.scrollbar.setY(Math.max(0, (targetY * flyoutWs.scale) - 40));
            }
        }
    </script>

    <script>
        window.addEventListener('load', () => {
            // Thay đổi chữ của khối lệnh điều kiện giống Scratch
            Blockly.Msg['CONTROLS_IF_MSG_IF'] = 'nếu';
            Blockly.Msg['CONTROLS_IF_MSG_THEN'] = 'thì';
            Blockly.Msg['CONTROLS_IF_MSG_ELSE'] = 'nếu không thì';
            Blockly.Msg['CONTROLS_IF_MSG_ELSEIF'] = 'hoặc nếu';

            // Ghi đè khối vòng lặp while/until để bỏ tùy chọn "cho đến khi"
            Blockly.Blocks['controls_whileUntil'] = {
                init: function () {
                    this.jsonInit({
                        "type": "controls_whileUntil",
                        "message0": "lặp lại trong khi %1",
                        "args0": [
                            { "type": "input_value", "name": "BOOL", "check": "Boolean" }
                        ],
                        "message1": "thực hiện %1",
                        "args1": [
                            { "type": "input_statement", "name": "DO" }
                        ],
                        "previousStatement": null,
                        "nextStatement": null,
                        "style": "loop_blocks",
                        "tooltip": "Lặp lại các lệnh trong khi điều kiện đúng."
                    });
                }
            };

            const toolboxXml = `

                    <block type="logic_operation"></block>

                    <label text="Vòng lặp"></label>
                    <block type="controls_whileUntil"></block>
                    <block type="controls_for">
                        <field name="VAR">i</field>
                        <value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value>
                        <value name="TO"><block type="math_number"><field name="NUM">10</field></block></value>
                        <value name="BY"><block type="math_number"><field name="NUM">1</field></block></value>
                    </block>

                    <label text="Bút vẽ"></label>

                    <block type="turtle_shape"></block>

                    <label text="Di chuyển"></label>
                    <block type="turtle_circle"><value name="RADIUS"><block type="math_number"><field name="NUM">90</field></block></value></block>
                    <block type="turtle_forward"><value name="STEPS"><block type="math_number"><field name="NUM">100</field></block></value></block>
                    <block type="turtle_backward"><value name="STEPS"><block type="math_number"><field name="NUM">50</field></block></value></block>
                    <block type="turtle_right"><value name="DEGREES"><block type="math_number"><field name="NUM">90</field></block></value></block>
                    <block type="turtle_left"><value name="DEGREES"><block type="math_number"><field name="NUM">90</field></block></value></block>
                    <block type="turtle_home"></block>
                    <block type="turtle_clear"></block>
                </xml>
            `;
            const div = document.createElement('div'); div.innerHTML = toolboxXml; document.body.appendChild(div);

            // Đổi tên biến mặc định từ 'vật' (dịch máy) sang một tên có ý nghĩa hơn trong lập trình
            if (Blockly.Msg) Blockly.Msg['VARIABLES_DEFAULT_NAME'] = 'a';

            workspace = Blockly.inject('blockly-editor', {
                toolbox: document.getElementById('toolbox'),
                trashcan: false, toolboxPosition: 'start', css: true, scrollbars: true, sounds: true,
                grid: { spacing: 25, length: 3, colour: '#cbd5e1', snap: true },
                zoom: { controls: true, wheel: false, startScale: 1.0, maxScale: 3.0, minScale: 0.01, scaleSpeed: 1.2, pinch: true }
            });

            // Khởi tạo khối bắt đầu mặc định và không cho phép xóa
            const defaultStartBlock = workspace.newBlock('event_start');
            defaultStartBlock.initSvg();
            defaultStartBlock.render();
            defaultStartBlock.setDeletable(false);
            defaultStartBlock.moveBy(50, 50);

            // Khôi phục lại trạng thái ghi đè zoomCenter (phiên bản ổn định nhất)
            try {
                const originalZoomCenter = workspace.zoomCenter;
                workspace.zoomCenter = function (type) {
                    if (type === undefined || type === 0) {
                        workspace.zoomToFit();
                    } else {
                        originalZoomCenter.call(workspace, type);
                    }
                };
            } catch (e) { }

            workspace.registerButtonCallback('CREATE_VARIABLE', function (button) { Blockly.Variables.createVariableButtonHandler(button.getTargetWorkspace()); });

            // Spoofing technique to lock flyout size and scale perfectly
            const fixFlyoutScale = () => {
                const fo = workspace.getFlyout();
                if (fo && !fo.isScalePatched) {
                    fo.isScalePatched = true;
                    const origPosition = fo.position;
                    fo.position = function () {
                        const targetWs = this.targetWorkspace || this.targetWorkspace_;
                        if (targetWs) {
                            const realScale = targetWs.scale; targetWs.scale = 0.8; origPosition.apply(this, arguments); targetWs.scale = realScale;
                        } else { origPosition.apply(this, arguments); }
                    };
                    const origReflow = fo.reflow;
                    fo.reflow = function () {
                        const targetWs = this.targetWorkspace || this.targetWorkspace_;
                        if (targetWs) {
                            const realScale = targetWs.scale; targetWs.scale = 0.8; origReflow.apply(this, arguments); targetWs.scale = realScale;
                        } else { origReflow.apply(this, arguments); }
                    };

                    const foWs = fo.getWorkspace();
                    if (foWs) {
                        foWs.isScaleLocked = true;
                        foWs.setScale = function (scale) { Blockly.WorkspaceSvg.prototype.setScale.call(this, 0.8); };
                        foWs.setScale(0.8);
                    }

                    // Fixed width for Scratch UI ratio
                    fo.width_ = 260;
                    fo.getWidth = function () { return 260; };
                    fo.reflow(); fo.position();
                }
            };

            registerAllGenerators();
            workspace.addChangeListener((e) => {
                if (e.type === Blockly.Events.VIEWPORT_CHANGE || e.type === Blockly.Events.FINISHED_LOADING) fixFlyoutScale();
                handleWorkspaceChange();
            });

            document.getElementById('blockly-editor').addEventListener('wheel', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                    if (workspace && workspace.zoom) {
                        const rect = document.getElementById('blockly-editor').getBoundingClientRect();
                        workspace.zoom(e.clientX - rect.left, e.clientY - rect.top, e.deltaY > 0 ? -1 : 1);
                    }
                } else {
                    e.preventDefault();
                    if (workspace && workspace.scrollbar) {
                        let scrollX = workspace.scrollX;
                        let scrollY = workspace.scrollY;
                        if (e.shiftKey) {
                            scrollX -= e.deltaY;
                        } else {
                            scrollY -= e.deltaY;
                        }
                        scrollX -= e.deltaX;
                        workspace.scroll(scrollX, scrollY);
                    }
                }
            }, { passive: false });

            setTimeout(() => { fixFlyoutScale(); }, 500);
            window.addEventListener('resize', () => { Blockly.svgResize(workspace); fixFlyoutScale(); });
            resetTurtle();
        });
    </script>

    <script>
        function showErrorAlert(msg) {
            const modal = document.getElementById('error-modal');
            const box = document.getElementById('error-modal-box');
            const msgEl = document.getElementById('error-modal-message');
            msgEl.textContent = msg;
            modal.classList.remove('hidden');
            void modal.offsetWidth; // Trigger reflow
            modal.classList.remove('opacity-0');
            box.classList.remove('scale-95');
        }

        function hideErrorAlert() {
            const modal = document.getElementById('error-modal');
            const box = document.getElementById('error-modal-box');
            modal.classList.add('opacity-0');
            box.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
    </script>

    <!-- Modals cho Nhập liệu và Biến số -->
    <div id="custom-prompt-modal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[9999] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-[400px] max-w-[90%] transform scale-95 transition-transform duration-300"
            id="custom-prompt-box">
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-xl"
                    id="custom-prompt-icon">
                    💬
                </div>
                <h3 class="text-lg font-bold text-slate-800" id="custom-prompt-title">Nhập dữ liệu</h3>
            </div>
            <p class="text-slate-600 mb-4 text-sm" id="custom-prompt-message">Vui lòng nhập giá trị:</p>
            <input type="text" id="custom-prompt-input"
                class="w-full px-4 py-2 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all text-slate-700 font-medium mb-6"
                autocomplete="off" spellcheck="false">
            <div class="flex justify-end space-x-3">
                <button id="custom-prompt-cancel"
                    class="px-5 py-2 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors hidden">Hủy</button>
                <button id="custom-prompt-ok"
                    class="px-5 py-2 rounded-xl font-bold text-white bg-indigo-500 hover:bg-indigo-600 shadow-md shadow-indigo-200 transition-colors">Xác
                    nhận</button>
            </div>
        </div>
    </div>

    <script>
        let customPromptTimeout = null;
        function showCustomPrompt(title, message, icon, defaultValue, showCancel) {
            return new Promise((resolve) => {
                if (customPromptTimeout) {
                    clearTimeout(customPromptTimeout);
                    customPromptTimeout = null;
                }
                const modal = document.getElementById('custom-prompt-modal');
                const box = document.getElementById('custom-prompt-box');
                const titleEl = document.getElementById('custom-prompt-title');
                const messageEl = document.getElementById('custom-prompt-message');
                const iconEl = document.getElementById('custom-prompt-icon');
                const inputEl = document.getElementById('custom-prompt-input');
                const btnOk = document.getElementById('custom-prompt-ok');
                const btnCancel = document.getElementById('custom-prompt-cancel');

                titleEl.textContent = title;
                messageEl.textContent = message;
                iconEl.textContent = icon;
                inputEl.value = defaultValue || '';

                if (showCancel) {
                    btnCancel.classList.remove('hidden');
                } else {
                    btnCancel.classList.add('hidden');
                }

                modal.classList.remove('hidden');
                // Trigger reflow
                void modal.offsetWidth;
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');

                inputEl.focus();
                inputEl.select();

                const cleanup = () => {
                    modal.classList.add('opacity-0');
                    box.classList.add('scale-95');
                    customPromptTimeout = setTimeout(() => { modal.classList.add('hidden'); }, 300);
                    btnOk.removeEventListener('click', onOk);
                    btnCancel.removeEventListener('click', onCancel);
                    inputEl.removeEventListener('keydown', onKey);
                };

                const onOk = () => { cleanup(); resolve(inputEl.value); };
                const onCancel = () => { cleanup(); resolve(null); };
                const onKey = (e) => {
                    if (e.key === 'Enter') onOk();
                    if (e.key === 'Escape' && showCancel) onCancel();
                };

                btnOk.addEventListener('click', onOk);
                btnCancel.addEventListener('click', onCancel);
                inputEl.addEventListener('keydown', onKey);
            });
        }

        // 1. Ghi đè Blockly Prompt cho việc tạo/đổi tên biến
        const customPromptCallback = function (message, defaultValue, callback) {
            let title = "Biến số mới";
            let icon = "🏷️";
            if (message.toLowerCase().includes('đổi') || message.toLowerCase().includes('rename')) {
                title = "Đổi tên biến";
                icon = "✏️";
            }
            showCustomPrompt(title, message, icon, defaultValue, true).then(value => {
                callback(value);
            });
        };

        if (Blockly.dialog && Blockly.dialog.setPrompt) {
            Blockly.dialog.setPrompt(customPromptCallback);
        } else {
            Blockly.prompt = customPromptCallback;
        }

        // 2. Hàm customPrompt gọi từ runtime cho lệnh Hỏi và đợi nhập
        function customPrompt(message) {
            return showCustomPrompt("Nhập dữ liệu", message, "💬", "", false);
        }
    </script>
</body>
